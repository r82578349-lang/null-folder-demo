<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Добавить объект — Нулевая Папка</title>
  <style>
    :root {
      --bg: #f3f5f9;
      --surface: #ffffff;
      --text: #15233b;
      --muted: #607089;
      --line: #dde3ec;
      --accent: #2d5bff;
      --ok: #1f9d57;
      --shadow: 0 10px 24px rgba(21,35,59,.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at 100% 0, #eaf0ff 0, transparent 42%), var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      line-height: 1.45;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    .back-link {
      text-decoration: none;
      color: var(--accent);
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    label .required {
      color: #c62828;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
      display: inline-block;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #2347cc;
    }

    .btn-secondary {
      background: #edf2ff;
      color: #163172;
      margin-left: 12px;
    }

    .btn-secondary:hover {
      background: #dce5ff;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 24px 0 16px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--line);
    }

    .help-text {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Добавить объект</h1>
      <a href="objects-list.html" class="back-link">← К списку объектов</a>
    </div>

    <div class="card">
      <form id="objectForm">

        <div class="section-title">Основная информация</div>

        <div class="form-group">
          <label>
            Название объекта <span class="required">*</span>
          </label>
          <input
            type="text"
            id="objectName"
            name="objectName"
            placeholder="ЖК Северный, корпус 1"
            required
          />
          <div class="help-text">Полное название объекта строительства</div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>
              Номер объекта
            </label>
            <input
              type="text"
              id="objectNumber"
              name="objectNumber"
              placeholder="ОБ-2024-001"
            />
          </div>

          <div class="form-group">
            <label>
              Статус объекта <span class="required">*</span>
            </label>
            <select id="objectStatus" name="objectStatus" required>
              <option value="preparation">Подготовка</option>
              <option value="active" selected>Активный</option>
              <option value="suspended">Приостановлен</option>
              <option value="completed">Завершён</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>
            Адрес объекта <span class="required">*</span>
          </label>
          <input
            type="text"
            id="objectAddress"
            name="objectAddress"
            placeholder="г. Москва, ул. Строителей, д. 10"
            required
          />
        </div>

        <div class="section-title">Заказчик и генподрядчик</div>

        <div class="form-group">
          <label>
            Заказчик <span class="required">*</span>
          </label>
          <input
            type="text"
            id="customer"
            name="customer"
            placeholder="ООО «Девелопмент»"
            required
          />
        </div>

        <div class="form-group">
          <label>
            Генподрядчик <span class="required">*</span>
          </label>
          <input
            type="text"
            id="contractor"
            name="contractor"
            placeholder="ООО «СтройГрупп»"
            required
          />
        </div>

        <div class="form-group">
          <label>
            Наша компания (субподрядчик) <span class="required">*</span>
          </label>
          <input
            type="text"
            id="subcontractor"
            name="subcontractor"
            placeholder="ООО «Ваша компания»"
            required
          />
        </div>

        <div class="section-title">Сроки и контакты</div>

        <div class="form-row">
          <div class="form-group">
            <label>
              Дата начала работ
            </label>
            <input
              type="date"
              id="startDate"
              name="startDate"
            />
          </div>

          <div class="form-group">
            <label>
              Плановая дата передачи НП
            </label>
            <input
              type="date"
              id="endDate"
              name="endDate"
            />
            <div class="help-text">Дата передачи документов генподрядчику</div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>
              Контактное лицо (ГП)
            </label>
            <input
              type="text"
              id="contactPerson"
              name="contactPerson"
              placeholder="Иванов Иван Иванович"
            />
          </div>

          <div class="form-group">
            <label>
              Телефон контактного лица
            </label>
            <input
              type="tel"
              id="contactPhone"
              name="contactPhone"
              placeholder="+7 (999) 123-45-67"
            />
          </div>
        </div>

        <div class="form-group">
          <label>
            Email для связи
          </label>
          <input
            type="email"
            id="contactEmail"
            name="contactEmail"
            placeholder="contact@example.com"
          />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>
              Мессенджер
            </label>
            <select id="messengerType" name="messengerType">
              <option value="">Не указан</option>
              <option value="telegram">Telegram</option>
              <option value="whatsapp">WhatsApp</option>
              <option value="viber">Viber</option>
            </select>
          </div>

          <div class="form-group">
            <label>
              Контакт в мессенджере
            </label>
            <input
              type="text"
              id="messengerContact"
              name="messengerContact"
              placeholder="@username или +7 (999) 123-45-67"
            />
            <div class="help-text">Никнейм или номер телефона</div>
          </div>
        </div>

        <div class="section-title">Дополнительная информация</div>

        <div class="form-group">
          <label>
            Виды работ
          </label>
          <textarea
            id="workTypes"
            name="workTypes"
            placeholder="Монтаж металлоконструкций, сварочные работы, покраска"
          ></textarea>
          <div class="help-text">Перечислите основные виды работ на объекте</div>
        </div>

        <div class="form-group">
          <label>
            Примечания
          </label>
          <textarea
            id="notes"
            name="notes"
            placeholder="Дополнительная информация об объекте"
          ></textarea>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary">Сохранить объект</button>
          <button type="button" class="btn btn-secondary" onclick="window.location.href='1-zero-folder-mvp.html'">
            Отмена
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/objects.js"></script>
  <script>
    let editingId = null;

    // Обработка формы
    document.getElementById('objectForm').addEventListener('submit', function(e) {
      e.preventDefault();

      // Собираем данные формы
      const formData = {
        objectName: document.getElementById('objectName').value,
        objectNumber: document.getElementById('objectNumber').value,
        objectStatus: document.getElementById('objectStatus').value,
        objectAddress: document.getElementById('objectAddress').value,
        customer: document.getElementById('customer').value,
        contractor: document.getElementById('contractor').value,
        subcontractor: document.getElementById('subcontractor').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        contactPerson: document.getElementById('contactPerson').value,
        contactPhone: document.getElementById('contactPhone').value,
        contactEmail: document.getElementById('contactEmail').value,
        messengerType: document.getElementById('messengerType').value,
        messengerContact: document.getElementById('messengerContact').value,
        workTypes: document.getElementById('workTypes').value,
        notes: document.getElementById('notes').value
      };

      if (editingId) {
        // Обновляем существующий объект
        ObjectsManager.update(editingId, formData);
        alert('Объект успешно обновлён!');
      } else {
        // Создаём новый объект
        const newObject = ObjectsManager.add(formData);
        alert('Объект успешно создан!');
        editingId = newObject.id;
      }

      // Переходим к списку объектов
      window.location.href = 'objects-list.html';
    });

    // Загрузка существующих данных при редактировании
    window.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const objectId = urlParams.get('id');

      if (objectId) {
        const object = ObjectsManager.getById(objectId);

        if (object) {
          editingId = objectId;

          // Заполняем форму существующими данными
          document.getElementById('objectName').value = object.objectName || '';
          document.getElementById('objectNumber').value = object.objectNumber || '';
          document.getElementById('objectStatus').value = object.objectStatus || 'active';
          document.getElementById('objectAddress').value = object.objectAddress || '';
          document.getElementById('customer').value = object.customer || '';
          document.getElementById('contractor').value = object.contractor || '';
          document.getElementById('subcontractor').value = object.subcontractor || '';
          document.getElementById('startDate').value = object.startDate || '';
          document.getElementById('endDate').value = object.endDate || '';
          document.getElementById('contactPerson').value = object.contactPerson || '';
          document.getElementById('contactPhone').value = object.contactPhone || '';
          document.getElementById('contactEmail').value = object.contactEmail || '';
          document.getElementById('messengerType').value = object.messengerType || '';
          document.getElementById('messengerContact').value = object.messengerContact || '';
          document.getElementById('workTypes').value = object.workTypes || '';
          document.getElementById('notes').value = object.notes || '';

          // Меняем заголовок и кнопку отмены
          document.querySelector('h1').textContent = 'Редактировать объект';
          document.querySelector('.btn-secondary').onclick = function() {
            window.location.href = 'objects-list.html';
          };
        }
      }
    });
  </script>
</body>
</html>
